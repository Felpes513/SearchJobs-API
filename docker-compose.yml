services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: searchjobs
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d searchjobs"]
      interval: 10s
      timeout: 5s
      retries: 5

  searchjobs-api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Sobrescreve o DB_URL do .env para apontar ao serviço postgres interno
      DB_URL: jdbc:postgresql://postgres:5432/searchjobs
    volumes:
      - resumes_data:/app/uploads/resumes

volumes:
  postgres_data:
  resumes_data: